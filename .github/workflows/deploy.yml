name: Deploy

on:
  workflow_run:
    workflows: ["Build"]
    types:
      - completed

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: read
      deployments: write
      pull-requests: write
      issues: write
      statuses: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Download PR info artifact
        id: download_pr_info
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: pr-info
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}
          path: pr_info_temp

      - name: Check Authorization and Initialize Status
        id: auth_check
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');

            let prNumber = null;
            let prSha = null;
            if (fs.existsSync('pr_info_temp/pr_number.txt')) {
              prNumber = fs.readFileSync('pr_info_temp/pr_number.txt', 'utf8').trim();
              prSha = fs.readFileSync('pr_info_temp/pr_sha.txt', 'utf8').trim();
            }

            const isPR = !!prNumber;
            const actor = context.payload.workflow_run.actor.login;
            const targetSha = isPR ? prSha : context.payload.workflow_run.head_sha;

            let authorized = !isPR;
            let reason = "";

            if (isPR) {
              const { data: permission } = await github.rest.repos.getCollaboratorPermissionLevel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                username: actor,
              });

              const hasWriteAccess = ['admin', 'write'].includes(permission.permission);

              const { data: pr } = await github.rest.pulls.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: parseInt(prNumber),
              });

              const hasLabel = pr.labels.some(l => l.name === 'allow-deploy');

              authorized = hasWriteAccess || hasLabel;
              if (!authorized) {
                reason = `Deployment is pending authorization. A user with write permissions must add the **allow-deploy** label to this PR. ⚠️ Use caution when authorizing PRs from external contributors.`;
              }
            }

            if (targetSha) {
              await github.rest.repos.createCommitStatus({
                owner: context.repo.owner,
                repo: context.repo.repo,
                sha: targetSha,
                state: 'pending',
                context: 'Cloudflare Workers Deployment',
                description: authorized ? 'Deploying to Cloudflare...' : 'Pending authorization.'
              });
            }

            core.setOutput('authorized', authorized);
            core.setOutput('is_pr', isPR);
            core.setOutput('pr_number', prNumber);
            core.setOutput('target_sha', targetSha);
            core.setOutput('worker_name', isPR ? `reading-list-pr-${prNumber}` : 'reading-list');
            core.setOutput('reason', reason);

      - name: Download artifacts
        if: steps.auth_check.outputs.authorized == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const artifacts = await github.rest.actions.listWorkflowRunArtifacts({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: context.payload.workflow_run.id,
            });

            const siteBuild = artifacts.data.artifacts.find(a => a.name === 'site-build');
            if (siteBuild) {
              const download = await github.rest.actions.downloadArtifact({
                owner: context.repo.owner,
                repo: context.repo.repo,
                artifact_id: siteBuild.id,
                archive_format: 'zip',
              });
              fs.writeFileSync('site-build.zip', Buffer.from(download.data));
            }

            const workerSrc = artifacts.data.artifacts.find(a => a.name === 'worker-src');
            if (workerSrc) {
              const download = await github.rest.actions.downloadArtifact({
                owner: context.repo.owner,
                repo: context.repo.repo,
                artifact_id: workerSrc.id,
                archive_format: 'zip',
              });
              fs.writeFileSync('worker-src.zip', Buffer.from(download.data));
            }

      - name: Prepare Deployment Directory and Extract
        if: steps.auth_check.outputs.authorized == 'true'
        run: |
          mkdir -p cloudflare_deployment/out
          cp cloudflare/wrangler.toml cloudflare_deployment/
          if [ "${{ steps.auth_check.outputs.is_pr }}" = "true" ]; then
            # Remove [[routes]] section for PR previews to use workers.dev URL
            sed -i '/\[\[routes\]\]/,$d' cloudflare_deployment/wrangler.toml
          fi
          if [ -f site-build.zip ]; then
            unzip -o site-build.zip -d cloudflare_deployment/out
          fi
          if [ -f worker-src.zip ]; then
            unzip -j -o worker-src.zip -d cloudflare_deployment/
          fi

      - name: Deploy to Cloudflare Workers
        if: steps.auth_check.outputs.authorized == 'true'
        id: wrangler_deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --name=${{ steps.auth_check.outputs.worker_name }}
          workingDirectory: cloudflare_deployment
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Create GitHub Deployment and Update Status
        if: always()
        uses: actions/github-script@v7
        env:
          AUTHORIZED: ${{ steps.auth_check.outputs.authorized }}
          TARGET_SHA: ${{ steps.auth_check.outputs.target_sha }}
          IS_PR: ${{ steps.auth_check.outputs.is_pr }}
          PR_NUMBER: ${{ steps.auth_check.outputs.pr_number }}
          DEPLOYMENT_URL: ${{ steps.wrangler_deploy.outputs.deployment-url }}
          WRANGLER_OUTCOME: ${{ steps.wrangler_deploy.outcome }}
          REASON: ${{ steps.auth_check.outputs.reason }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const authorized = process.env.AUTHORIZED === "true";
            const targetSha = process.env.TARGET_SHA;
            const isPR = process.env.IS_PR === "true";
            const prNumber = parseInt(process.env.PR_NUMBER);
            const deploymentUrl = process.env.DEPLOYMENT_URL;
            const wranglerOutcome = process.env.WRANGLER_OUTCOME;
            const logUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            console.log(`Deployment details:
              authorized: ${authorized}
              targetSha: ${targetSha}
              isPR: ${isPR}
              prNumber: ${prNumber}
              wranglerOutcome: ${wranglerOutcome}
              deploymentUrl: ${deploymentUrl}
            `);

            const success = authorized && wranglerOutcome === 'success' && (isPR ? !!deploymentUrl : true);
            const failure = authorized && !success;

            let finalDeploymentUrl = deploymentUrl;
            if (success && !isPR) {
              finalDeploymentUrl = 'https://reading-list.korren.org/';
            } else if (finalDeploymentUrl) {
              // Sanitize URL: remove descriptive text and ensure protocol
              finalDeploymentUrl = finalDeploymentUrl.split(' ')[0].trim();
              if (finalDeploymentUrl && !finalDeploymentUrl.startsWith('http')) {
                finalDeploymentUrl = `https://${finalDeploymentUrl}`;
              }
            }

            if (targetSha) {
              // Update Commit Status
              try {
                await github.rest.repos.createCommitStatus({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  sha: targetSha,
                  state: success ? 'success' : (failure ? 'failure' : 'pending'),
                  context: 'Cloudflare Workers Deployment',
                  description: success ? 'Deployed successfully!' : (failure ? 'Deployment failed.' : 'Pending authorization.'),
                  target_url: success ? finalDeploymentUrl : (failure ? logUrl : undefined)
                });
              } catch (e) {
                console.error("Error creating commit status:", e);
              }
            }

            if (success) {
              // Create GitHub Deployment
              try {
                const { data: deployment } = await github.rest.repos.createDeployment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  ref: targetSha,
                  environment: isPR ? 'preview' : 'production',
                  auto_merge: false,
                  required_contexts: []
                });

                await github.rest.repos.createDeploymentStatus({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  deployment_id: deployment.id,
                  state: 'success',
                  environment_url: finalDeploymentUrl,
                  log_url: logUrl
                });
              } catch (e) {
                console.error("Error creating GitHub deployment:", e);
              }
            }

            // Update PR Comment
            if (isPR && prNumber) {
              try {
                const reason = process.env.REASON;
                const marker = "<!-- cf-deployment-preview -->";
                let body = marker + "\n";

                if (success) {
                  body += `🚀 PR Preview deployed to: [${finalDeploymentUrl}](${finalDeploymentUrl})`;
                } else if (failure) {
                  body += `❌ Deployment failed. Check [logs](${logUrl}) for details.`;
                  if (wranglerOutcome !== 'success' && wranglerOutcome !== 'failure') {
                    body += `\n\n**Note:** Deployment was skipped or timed out.`;
                  }
                } else {
                  body += reason || "Deployment is pending authorization.";
                }

                const { data: comments } = await github.rest.issues.listComments({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: prNumber,
                });

                const existingComment = comments.find(c => c.body.includes(marker));

                if (existingComment) {
                  await github.rest.issues.updateComment({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    comment_id: existingComment.id,
                    body: body
                  });
                } else {
                  await github.rest.issues.createComment({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: prNumber,
                    body: body
                  });
                }
              } catch (e) {
                console.error("Error updating PR comment:", e);
              }
            }
