name: Deploy

on:
  workflow_run:
    workflows: ["Build"]
    types:
      - completed

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: read
      deployments: write
      pull-requests: write
      issues: write
      statuses: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Download PR info artifact
        id: download_pr_info
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: pr-info
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}
          path: pr_info_temp

      - name: Check Authorization and Initialize Status
        id: auth_check
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');

            let prNumber = null;
            let prSha = null;
            if (fs.existsSync('pr_info_temp/pr_number.txt')) {
              prNumber = fs.readFileSync('pr_info_temp/pr_number.txt', 'utf8').trim();
              prSha = fs.readFileSync('pr_info_temp/pr_sha.txt', 'utf8').trim();
            }

            const isPR = !!prNumber;
            const actor = context.payload.workflow_run.actor.login;
            const targetSha = isPR ? prSha : context.payload.workflow_run.head_sha;

            let authorized = !isPR;
            let reason = "";

            if (isPR) {
              const { data: permission } = await github.rest.repos.getCollaboratorPermissionLevel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                username: actor,
              });

              const hasWriteAccess = ['admin', 'write'].includes(permission.permission);

              const { data: pr } = await github.rest.pulls.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: parseInt(prNumber),
              });

              const hasLabel = pr.labels.some(l => l.name === 'allow-deploy');

              authorized = hasWriteAccess || hasLabel;
              if (!authorized) {
                reason = `Deployment is pending authorization. A user with write permissions must add the **allow-deploy** label to this PR. ⚠️ Use caution when authorizing PRs from external contributors.`;
              }
            }

            if (authorized) {
              await github.rest.repos.createCommitStatus({
                owner: context.repo.owner,
                repo: context.repo.repo,
                sha: targetSha,
                state: 'pending',
                context: 'Cloudflare Workers Deployment',
                description: 'Deploying to Cloudflare...'
              });
            }

            core.setOutput('authorized', authorized);
            core.setOutput('is_pr', isPR);
            core.setOutput('pr_number', prNumber);
            core.setOutput('target_sha', targetSha);
            core.setOutput('worker_name', isPR ? `reading-list-pr-${prNumber}` : 'reading-list');
            core.setOutput('reason', reason);

      - name: Download artifacts
        if: steps.auth_check.outputs.authorized == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const artifacts = await github.rest.actions.listWorkflowRunArtifacts({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: context.payload.workflow_run.id,
            });

            const siteBuild = artifacts.data.artifacts.find(a => a.name === 'site-build');
            if (siteBuild) {
              const download = await github.rest.actions.downloadArtifact({
                owner: context.repo.owner,
                repo: context.repo.repo,
                artifact_id: siteBuild.id,
                archive_format: 'zip',
              });
              fs.writeFileSync('site-build.zip', Buffer.from(download.data));
            }

            const workerSrc = artifacts.data.artifacts.find(a => a.name === 'worker-src');
            if (workerSrc) {
              const download = await github.rest.actions.downloadArtifact({
                owner: context.repo.owner,
                repo: context.repo.repo,
                artifact_id: workerSrc.id,
                archive_format: 'zip',
              });
              fs.writeFileSync('worker-src.zip', Buffer.from(download.data));
            }

      - name: Prepare Deployment Directory and Extract
        if: steps.auth_check.outputs.authorized == 'true'
        run: |
          mkdir -p cloudflare_deployment/out
          cp cloudflare/wrangler.toml cloudflare_deployment/
          if [ -f site-build.zip ]; then
            unzip -o site-build.zip -d cloudflare_deployment/out
          fi
          if [ -f worker-src.zip ]; then
            unzip -j -o worker-src.zip -d cloudflare_deployment/
          fi

      - name: Deploy to Cloudflare Workers
        if: steps.auth_check.outputs.authorized == 'true'
        id: wrangler_deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --name=${{ steps.auth_check.outputs.worker_name }}
          workingDirectory: cloudflare_deployment
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Create GitHub Deployment and Update Status
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const authorized = "${{ steps.auth_check.outputs.authorized }}" === "true";
            const targetSha = "${{ steps.auth_check.outputs.target_sha }}";
            const isPR = "${{ steps.auth_check.outputs.is_pr }}" === "true";
            const prNumber = parseInt("${{ steps.auth_check.outputs.pr_number }}");
            let deploymentUrl = "${{ steps.wrangler_deploy.outputs.deployment-url }}";
            const success = authorized && !!deploymentUrl;

            if (success && !isPR) {
              deploymentUrl = "https://reading-list.korren.org/";
            }

            // Update Commit Status
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: targetSha,
              state: success ? 'success' : (authorized ? 'failure' : 'pending'),
              context: 'Cloudflare Workers Deployment',
              description: success ? 'Deployed successfully!' : (authorized ? 'Deployment failed.' : 'Pending authorization.'),
              target_url: deploymentUrl || undefined
            });

            if (success) {
              // Create GitHub Deployment
              const { data: deployment } = await github.rest.repos.createDeployment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: targetSha,
                environment: isPR ? 'preview' : 'production',
                auto_merge: false,
                required_contexts: []
              });

              await github.rest.repos.createDeploymentStatus({
                owner: context.repo.owner,
                repo: context.repo.repo,
                deployment_id: deployment.id,
                state: 'success',
                environment_url: deploymentUrl,
                log_url: `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
              });
            }

            // Update PR Comment
            if (isPR) {
              const reason = `${{ steps.auth_check.outputs.reason }}`;
              const marker = "<!-- cf-deployment-preview -->";
              let body = marker + "\n";

              if (success) {
                body += `🚀 PR Preview deployed to: ${deploymentUrl}`;
              } else if (authorized) {
                body += `❌ Deployment failed. Check [logs](https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}) for details.`;
              } else {
                body += reason;
              }

              const { data: comments } = await github.rest.issues.listComments({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
              });

              const existingComment = comments.find(c => c.body.includes(marker));

              if (existingComment) {
                await github.rest.issues.updateComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: existingComment.id,
                  body: body
                });
              } else {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: prNumber,
                  body: body
                });
              }
            }
